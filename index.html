<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ISGRAPH.JP</title>
<style>
    /* 1. まずブラウザの基本余白をゼロにする（必須） */
    html, body {
        margin: 0;
        padding: 0;
    }

    /* 2. bodyに「不透明な単色カラーコード」を指定する */
    body {
        background-color: #faf8f5; /* rgb(250, 248, 245) の16進数表記です */
        font-size: 2.4vw;
        font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
        font-weight: normal;
        color: #777}
    div.message1 {
        position: absolute;
        margin-top: 100px;
        margin-left: 150px;
        }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>


<body>
<script>
function setup() {
  createCanvas(windowWidth, windowHeight);
  frameRate(12);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

function draw() {
      background(250, 248, 245);
      noFill();
      stroke(15, 25, 55, 60);
      strokeWeight(1);
      let time = frameCount * 0.005;
      for (let i = 0; i < windowHeight / 5; i++) {
        beginShape();
        for (let x = 0; x < windowWidth; x += 10) {
          let noiseVal = noise(i * (0.007 + time), x * 0.007);
          let y = 0 + (i * 5) + (noiseVal * 1800);
          vertex(x, y);
        }
        endShape();
      }
    }
  </script>
    <div class="message1">
    ISGRAPH<br><br>

    Design<br>
    Code<br>
    Sound<br><br>

    junmine@isgraph.jp
  </div>
</body>
</html>
