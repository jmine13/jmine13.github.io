<script>
let _startMillis = 0;
const _stopAfter = 5000; // ms
let _lineOffsets = [];
let _globalTimeOffset = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  frameRate(12);
  // Record the start time (milliseconds)
  _startMillis = millis();
  // Give each line a random phase offset to preserve randomness
  let lines = Math.ceil(windowHeight / 5);
  _lineOffsets = [];
  for (let i = 0; i < lines; i++) {
    _lineOffsets.push(random(0, 1000));
  }
  // Use a global time offset to break noise periodicity
  _globalTimeOffset = random(0, 10000);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  // Recalculate line offsets when the window is resized
  let lines = Math.ceil(windowHeight / 5);
  _lineOffsets = [];
  for (let i = 0; i < lines; i++) {
    _lineOffsets.push(random(0, 1000));
  }
  _globalTimeOffset = random(0, 10000);
    }

function draw() {
  // Elapsed time and progress (0 to 1)
  let elapsed = millis() - _startMillis;
  let progress = constrain(elapsed / _stopAfter, 0, 1);

  // Slowdown curve (smooth): speed goes from 1 to 0
  let speed = max(0, 1 - progress * progress);

  background(250, 248, 245);
  noFill();
  stroke(15, 25, 55, 60);
  strokeWeight(1);

  // Use elapsed seconds and a frequency factor so time increases monotonically (prevent looping)
  let elapsedSec = elapsed / 1000;
  const minFreqFactor = 0.08; // 減速しても時間進行は残す
  let freqFactor = minFreqFactor + (1 - minFreqFactor) * speed;
  let time = elapsedSec * freqFactor;
  // Keep a minimum amplitude to avoid horizontal stripes
  const minAmpFactor = 0.25;
  let ampFactor = minAmpFactor + (1 - minAmpFactor) * speed;
  let lines = Math.ceil(windowHeight / 5);
  for (let i = 0; i < lines; i++) {
    beginShape();
    let offset = _lineOffsets[i] || 0;
    for (let x = 0; x < windowWidth; x += 10) {
      // Main low-frequency noise (add global offset)
      let n1 = noise((i * 0.007) + time + offset + _globalTimeOffset, x * 0.007);
      // Mix in a small high-frequency noise for extra randomness (different scale)
      let n2 = noise((i * 0.02) + (time * 1.8) + offset * 1.3 + _globalTimeOffset * 0.01, x * 0.02);
      let noiseVal = n1 * 0.7 + n2 * 0.3;
      let y = 0 + (i * 5) + (noiseVal * windowHeight * 0.7 * ampFactor);
      vertex(x, y);
    }
    endShape();
  }

  // Stop the draw loop when fully stopped
  if (progress >= 1) {
    noLoop();
  }
}
</script>
