<body>
<script>
function setup() {
  createCanvas(windowWidth, windowHeight);
  frameRate(12);
    }

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
    }

function draw() {
      background(250, 248, 245);
      noFill();
      stroke(15, 25, 55, 60);
      strokeWeight(1);
      let time = frameCount * 0.005;
      for (let i = 0; i < windowHeight / 5; i++) {
        beginShape();
        for (let x = 0; x < windowWidth; x += 10) {
          let noiseVal = noise(i * (0.007 + time), x * 0.007);
          let y = 0 + (i * 5) + (noiseVal * windowHeight * 0.7);
          vertex(x, y);
        }
        endShape();
      }
    }
</script>
